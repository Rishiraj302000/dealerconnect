spring.application.name=AUTH-SERVICE
server.port=8081

# MySQL datasource (schema auto-created on first run)
spring.datasource.url=jdbc:mysql://localhost:3306/dealerconnect_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (the secret is shared with the API Gateway for validation in Phase 4)
jwt.secret=ZGVhbGVyY29ubmVjdC1qd3Qtc2VjcmV0LWtleS1zaGFyZWQtYmV0d2Vlbi1nYXRld2F5LWFuZC1hdXRoLXNlcnZpY2UtaHM1MTItMjAyNg==
jwt.expiration-ms=3600000
