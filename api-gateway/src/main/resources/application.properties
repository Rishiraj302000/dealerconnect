spring.application.name=API-GATEWAY
server.port=8080

# Register the gateway with the Eureka registry so lb:// URIs can be resolved.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT validation secret (must match the value used by AUTH-SERVICE to sign tokens).
jwt.secret=ZGVhbGVyY29ubmVjdC1qd3Qtc2VjcmV0LWtleS1zaGFyZWQtYmV0d2Vlbi1nYXRld2F5LWFuZC1hdXRoLXNlcnZpY2UtaHM1MTItMjAyNg==

# Explicit routes. lb://SERVICE-NAME is resolved via Eureka + Spring Cloud LoadBalancer.
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=dealer-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://DEALER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/dealers/**

spring.cloud.gateway.server.webflux.routes[2].id=dealer-contacts
spring.cloud.gateway.server.webflux.routes[2].uri=lb://DEALER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/contacts/**

spring.cloud.gateway.server.webflux.routes[3].id=favorite-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://FAVORITE-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/favorites/**

spring.cloud.gateway.server.webflux.routes[4].id=audit-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://AUDIT-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/audit/**
